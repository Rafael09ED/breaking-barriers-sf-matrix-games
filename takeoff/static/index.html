<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <title>TAKEOFF</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body data-page="index">
  <main class="start-shell">
    <header class="masthead">
      <p class="eyebrow">AI 2027 MATRIX GAME</p>
      <h1>TAKEOFF</h1>
      <p id="purpose" class="purpose">Loading scenario...</p>
    </header>
    <section aria-labelledby="choose-role">
      <div class="section-heading">
        <h2 id="choose-role">Choose your role</h2>
        <span>Four other roles are played by LLMs</span>
      </div>
      <div id="roles" class="role-list" aria-live="polite"></div>
      <p id="start-error" class="error" hidden></p>
    </section>
  </main>
  <script src="/static/app.js" defer></script>
</body>
</html>
